<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Moses Lab — 3D Walkthrough</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0f;
      cursor: pointer;
    }
    body.pointer-locked { cursor: none; }
    #canvas { display: block; width: 100vw; height: 100vh; }
    #ui {
      position: fixed; top: 0; left: 0; width: 100%;
      padding: 1rem 1.5rem;
      background: linear-gradient(to bottom, rgba(0,0,0,0.75), transparent);
      color: #e8e8e8; pointer-events: none; z-index: 10;
    }
    #ui h1 { font-size: 1rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; }
    #prompt {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      padding: 1rem 2rem; background: rgba(0,0,0,0.88); color: #b8e0ff;
      border: 2px solid rgba(100,180,255,0.45); border-radius: 8px;
      font-size: 1rem; text-align: center; z-index: 20; pointer-events: none;
    }
    #prompt.hidden { opacity: 0; }
    #crosshair {
      position: fixed; top: 50%; left: 50%; width: 20px; height: 20px;
      margin: -10px 0 0 -10px; border: 2px solid rgba(255,255,255,0.6);
      border-radius: 50%; pointer-events: none; z-index: 15;
    }
    .hidden { opacity: 0; }
  </style>
</head>
<body>
  <div id="ui"><h1>Moses Lab Walkthrough</h1></div>
  <div id="prompt">Click to play — WASD move, mouse look — Main door start</div>
  <div id="crosshair" class="hidden"></div>
  <canvas id="canvas"></canvas>

  <!-- Socket.IO client for multiplayer -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" integrity="sha384-yZK0kAafmofEh7xWskg+SyGnG0AgZkU5b7SLT+NRsStnVYog3l+8xjzFImhz4D7F" crossorigin="anonymous"></script>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

    const WALL_H = 3;
    const bounds = [];
    const PLAYER_R = 0.35;

    function addBounds(minX, maxX, minZ, maxZ) {
      bounds.push({ minX, maxX, minZ, maxZ });
    }

    function addWallBox(x, z, w, d, mat, y = WALL_H / 2) {
      const g = new THREE.BoxGeometry(w, WALL_H, d);
      const mesh = new THREE.Mesh(g, mat);
      mesh.position.set(x, y, z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);
      addBounds(x - w / 2, x + w / 2, z - d / 2, z + d / 2);
    }

    function addTable(x, z, w, d, label) {
      const h = 0.9;
      const top = new THREE.Mesh(
        new THREE.BoxGeometry(w, 0.08, d),
        new THREE.MeshStandardMaterial({ color: 0x4a5568, roughness: 0.85 })
      );
      top.position.set(x, h, z);
      top.castShadow = true;
      top.receiveShadow = true;
      scene.add(top);
      addBounds(x - w / 2, x + w / 2, z - d / 2, z + d / 2);

      const legMat = new THREE.MeshStandardMaterial({ color: 0x3d4555, roughness: 0.9 });
      [[-1,-1],[1,-1],[-1,1],[1,1]].forEach(([sx, sz]) => {
        const leg = new THREE.Mesh(new THREE.BoxGeometry(0.08, h - 0.04, 0.08), legMat);
        leg.position.set(x + sx * (w / 2 - 0.15), (h - 0.04) / 2, z + sz * (d / 2 - 0.15));
        scene.add(leg);
      });

      if (label) addLabelSprite(x, h + 0.35, z, label);
    }

    function addLabelSprite(x, y, z, text) {
      const c = document.createElement('canvas');
      c.width = 512;
      c.height = 128;
      const ctx = c.getContext('2d');
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.fillRect(0, 0, 512, 128);
      ctx.strokeStyle = '#6ab0ff';
      ctx.lineWidth = 4;
      ctx.strokeRect(2, 2, 508, 124);
      ctx.fillStyle = '#e8f4ff';
      ctx.font = 'bold 28px Segoe UI, sans-serif';
      ctx.fillText(text.slice(0, 22), 16, 78);
      const tex = new THREE.CanvasTexture(c);
      const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true });
      const plane = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 0.4), mat);
      plane.position.set(x, y, z);
      plane.lookAt(x, y, z + 1);
      scene.add(plane);
    }

    function addMachine(x, z, w, d, h, label, color = 0xc5c2bc) {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        new THREE.MeshStandardMaterial({ color, roughness: 0.75, metalness: 0.1 })
      );
      mesh.position.set(x, h / 2, z);
      mesh.castShadow = true;
      scene.add(mesh);
      addBounds(x - w / 2, x + w / 2, z - d / 2, z + d / 2);
      if (label) addLabelSprite(x, h + 0.25, z, label);
    }

    const canvas = document.getElementById('canvas');
    const promptEl = document.getElementById('prompt');
    const crosshair = document.getElementById('crosshair');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0d1018);
    scene.fog = new THREE.Fog(0x0d1018, 12, 42);

    // Main lab: ~18m x 12m (interior). South = -Z (main door), North = +Z (glass).
    const HALF_X = 9;
    const HALF_Z = 6;
    const officeHalfX = 4;
    // Office now attached to the RIGHT side of the main lab (opposite of previous side)
    const officeMinX = HALF_X + officeHalfX * 2;

    const wallMat = new THREE.MeshStandardMaterial({
      color: 0xeef2fb, roughness: 0.9, metalness: 0.02,
    });
    const glassMat = new THREE.MeshPhysicalMaterial({
      color: 0xf5fbff,
      roughness: 0.04,
      metalness: 0.0,
      transparent: true,
      opacity: 0.12,
      transmission: 0.95,
      thickness: 0.16,
      side: THREE.DoubleSide, // bright from inside and outside
    });

    // Floor (main lab) — light blue/white
    const floorMain = new THREE.Mesh(
      new THREE.PlaneGeometry(HALF_X * 2, HALF_Z * 2),
      new THREE.MeshStandardMaterial({ color: 0xe5edf8, roughness: 0.95 })
    );
    floorMain.rotation.x = -Math.PI / 2;
    scene.add(floorMain);

    // Office floor (slightly darker blue)
    const floorOffice = new THREE.Mesh(
      new THREE.PlaneGeometry(officeHalfX * 2, HALF_Z * 2),
      new THREE.MeshStandardMaterial({ color: 0xd2e0f0, roughness: 0.94 })
    );
    floorOffice.rotation.x = -Math.PI / 2;
    // Centered between main lab east wall and outer office wall (now on right side)
    floorOffice.position.set((officeMinX + HALF_X) / 2, 0.01, 0);
    scene.add(floorOffice);

    // --- South wall: back door ~(-7, w1.2), main door ~(0, w2.2) ---
    const southZ = -HALF_Z;
    const wallThick = 0.28;
    addWallBox(-8.3, southZ, 1.4, wallThick, wallMat);   // -9 .. -7.6
    addWallBox(-3.75, southZ, 5.3, wallThick, wallMat); // -6.4 .. -1.1
    addWallBox(5.05, southZ, 7.9, wallThick, wallMat);   // 1.1 .. 9

    // --- North wall: all glass looking out to cityscape ---
    const glassPanelW = 2.2;
    const panels = Math.ceil((HALF_X * 2) / glassPanelW);
    for (let i = 0; i < panels; i++) {
      const px = -HALF_X + glassPanelW / 2 + i * glassPanelW;
      if (px > HALF_X - glassPanelW / 2) break;
      const gw = Math.min(glassPanelW, HALF_X - px + glassPanelW / 2);
      const gmesh = new THREE.Mesh(new THREE.BoxGeometry(gw, WALL_H, 0.08), glassMat);
      gmesh.position.set(px, WALL_H / 2, HALF_Z);
      scene.add(gmesh);
      // No collision on glass so you can stand at window wall
    }

    // Simple \"cityscape\" backdrop outside the glass (bright daytime)
    (function addCityBackdrop() {
      const c = document.createElement('canvas');
      c.width = 1024;
      c.height = 512;
      const ctx = c.getContext('2d');
      // Sky gradient
      const sky = ctx.createLinearGradient(0, 0, 0, c.height);
      sky.addColorStop(0, '#c9e6ff');
      sky.addColorStop(1, '#78a7e0');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, c.width, c.height);
      // Simple skyline silhouettes
      ctx.fillStyle = '#3b4c63';
      for (let i = 0; i < 18; i++) {
        const w = 30 + Math.random() * 70;
        const h = 80 + Math.random() * 180;
        const x = Math.random() * (c.width - w);
        ctx.fillRect(x, c.height - h, w, h);
      }
      ctx.fillStyle = '#273241';
      for (let i = 0; i < 12; i++) {
        const w = 40 + Math.random() * 90;
        const h = 140 + Math.random() * 220;
        const x = Math.random() * (c.width - w);
        ctx.fillRect(x, c.height - h, w, h);
      }
      const tex = new THREE.CanvasTexture(c);
      tex.anisotropy = 8;
      const mat = new THREE.MeshBasicMaterial({
        map: tex,
        depthWrite: false,
        side: THREE.DoubleSide,
      });
      // Backdrop matches wall height so all glass areas read as the same height
      const plane = new THREE.Mesh(new THREE.PlaneGeometry(HALF_X * 3, WALL_H), mat);
      plane.position.set(0, WALL_H / 2, HALF_Z + 0.3);
      scene.add(plane);
    })();

    // Bright inner window glow so windows feel lit from inside
    const innerGlowMat = new THREE.MeshBasicMaterial({
      color: 0xf7fcff,
      transparent: true,
      opacity: 0.32,
      side: THREE.DoubleSide,
    });
    const innerGlow = new THREE.Mesh(
      new THREE.PlaneGeometry(HALF_X * 2, WALL_H),
      innerGlowMat
    );
    innerGlow.position.set(0, WALL_H / 2, HALF_Z - 0.04);
    scene.add(innerGlow);

    // West wall of main lab: solid (no extra rooms on this side)
    const westX = -HALF_X;
    addWallBox(westX, 0, wallThick, HALF_Z * 2, wallMat);

    // East wall of main lab: two doorways leading to two separate side rooms on the RIGHT
    const eastX = HALF_X;
    // Top segment (above upper door)
    addWallBox(eastX, HALF_Z - 1.5, wallThick, 3.0, wallMat);
    // Segment between the two doors
    addWallBox(eastX, 0, wallThick, 2.0, wallMat);
    // Bottom segment (below lower door)
    addWallBox(eastX, -HALF_Z + 1.5, wallThick, 3.0, wallMat);

    // Side room floors on right side (two rooms aligned with the doorways)
    const sideRoomHalfX = 3.0;
    const sideRoomDepthZ = 3.0;
    const sideRoomOffsetX = eastX + sideRoomHalfX; // center of side rooms
    const sideRoomFloorMat = new THREE.MeshStandardMaterial({ color: 0xdde8f8, roughness: 0.95 });

    const roomTopFloor = new THREE.Mesh(
      new THREE.PlaneGeometry(sideRoomHalfX * 2, sideRoomDepthZ * 2),
      sideRoomFloorMat
    );
    roomTopFloor.rotation.x = -Math.PI / 2;
    roomTopFloor.position.set(sideRoomOffsetX, 0.01, HALF_Z - 2.5);
    scene.add(roomTopFloor);

    const roomBottomFloor = new THREE.Mesh(
      new THREE.PlaneGeometry(sideRoomHalfX * 2, sideRoomDepthZ * 2),
      sideRoomFloorMat
    );
    roomBottomFloor.rotation.x = -Math.PI / 2;
    const roomBottomCenterZ = -HALF_Z + 2.5;
    roomBottomFloor.position.set(sideRoomOffsetX, 0.01, roomBottomCenterZ);
    scene.add(roomBottomFloor);

    // Side rooms' perimeter walls (right side)
    // Top room: one wall toward the city line (same Z as main glass) is glass; other walls solid
    addWallBox(sideRoomOffsetX + sideRoomHalfX, HALF_Z - 2.5, wallThick, sideRoomDepthZ * 2, wallMat); // outer east (solid)
    addWallBox(sideRoomOffsetX, HALF_Z, sideRoomHalfX * 2, wallThick, glassMat); // north glass wall exactly on main window line
    addWallBox(sideRoomOffsetX, HALF_Z - 2.5 - sideRoomDepthZ, sideRoomHalfX * 2, wallThick, wallMat); // south
    // Bottom room (solid outer wall)
    addWallBox(sideRoomOffsetX + sideRoomHalfX, -HALF_Z + 2.5, wallThick, sideRoomDepthZ * 2, wallMat); // outer east
    addWallBox(sideRoomOffsetX, -HALF_Z + 2.5 + sideRoomDepthZ, sideRoomHalfX * 2, wallThick, wallMat); // north
    addWallBox(sideRoomOffsetX, -HALF_Z + 2.5 - sideRoomDepthZ, sideRoomHalfX * 2, wallThick, wallMat); // south

    // Desk in the middle of the bottom side room
    const deskW = 2.0;
    const deskD = 1.2;
    const deskH = 0.8;
    const deskTop = new THREE.Mesh(
      new THREE.BoxGeometry(deskW, 0.08, deskD),
      new THREE.MeshStandardMaterial({ color: 0xcfd6e2, roughness: 0.8 })
    );
    deskTop.position.set(sideRoomOffsetX, deskH, roomBottomCenterZ);
    deskTop.castShadow = true;
    scene.add(deskTop);
    addBounds(
      sideRoomOffsetX - deskW / 2,
      sideRoomOffsetX + deskW / 2,
      roomBottomCenterZ - deskD / 2,
      roomBottomCenterZ + deskD / 2
    );

    // Office perimeter on RIGHT side of main lab
    const officeCx = (officeMinX + HALF_X) / 2;
    // Outer office wall
    addWallBox(officeMinX, 0, wallThick, HALF_Z * 2, wallMat);
    // Top/bottom office walls
    addWallBox(officeCx, HALF_Z, officeHalfX * 2, wallThick, wallMat);
    addWallBox(officeCx, -HALF_Z, officeHalfX * 2, wallThick, wallMat);

    // East wall of main lab with a door opening into the office
    const eastWallForOfficeX = HALF_X;
    addWallBox(eastWallForOfficeX, -HALF_Z + 2, wallThick, 3.5, wallMat);
    addWallBox(eastWallForOfficeX, HALF_Z - 2, wallThick, 3.5, wallMat);

    // --- Long benches in the middle (dark grey lines in blueprint) ---
    // Now running front-to-back (perpendicular to before), two parallel benches.
    const benchWidthX = 0.9;               // thin in X
    const benchLengthZ = HALF_Z * 2 - 4;   // slightly shorter than full room depth

    // Left / right benches (from player spawn POV facing window)
    const benchLeftX = -2.6;
    const benchRightX = 2.6;
    const benchCenterZ = 0.4;

    addTable(benchLeftX, benchCenterZ, benchWidthX, benchLengthZ, '');
    addTable(benchRightX, benchCenterZ, benchWidthX, benchLengthZ, '');

    // Short, narrower computer blocks along benches (about half the width of old tables)
    const pcW = 1.1;
    const pcD = 0.55;
    const pcH = 0.45;
    const pcColor = 0x293343;

    function addComputerOnBench(x, z, label) {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(pcW, pcH, pcD),
        new THREE.MeshStandardMaterial({ color: pcColor, roughness: 0.6, metalness: 0.2 })
      );
      mesh.position.set(x, 0.9 + pcH / 2 + 0.02, z);
      mesh.castShadow = true;
      scene.add(mesh);
      addBounds(x - pcW / 2, x + pcW / 2, z - pcD / 2, z + pcD / 2);
      if (label) addLabelSprite(x, mesh.position.y + 0.35, z, label);
    }

    // Place representative computers from blueprint along benches (distributed along Z)
    addComputerOnBench(benchLeftX, 2.4, 'NOLAB57');
    addComputerOnBench(benchLeftX, 0.8, 'NOBLB01');
    addComputerOnBench(benchLeftX, -0.8, 'NOBLB05');
    addComputerOnBench(benchLeftX, -2.4, 'NOBLB13');

    addComputerOnBench(benchRightX, 2.4, 'NOBLB02');
    addComputerOnBench(benchRightX, 0.8, 'NOBLB14');
    addComputerOnBench(benchRightX, -0.8, 'NOBLB07');
    addComputerOnBench(benchRightX, -2.4, 'NOBLB23');

    // --- Echo Lumena top-right (against window, but walkable around front/sides) ---
    addMachine(HALF_X - 1.4, HALF_Z - 1.8, 0.72, 0.58, 1.05, 'ECHO LUMENA 1 M20366', 0xe8e6e0);
    addMachine(HALF_X - 1.4 - 0.9, HALF_Z - 1.8, 0.72, 0.58, 1.05, 'ECHO LUMENA 2 M21226', 0xe8e6e0);

    // --- Office: NEO IRIS + MOBLB08 ---
    addMachine(officeCx, 2, 1.0, 0.6, 1.6, 'NEO IRIS 1', 0xb8c0c8);
    addMachine(officeCx, -2, 1.0, 0.6, 1.6, 'NEO IRIS 2', 0xb8c0c8);
    addTable(officeMinX + 1.5, 0, 1.8, 0.6, 'MOBLB08 (Sup)');

    // Lighting — bright, clinical white/blue
    const amb = new THREE.AmbientLight(0xcfd8ff, 0.75);
    scene.add(amb);
    const dir = new THREE.DirectionalLight(0xffffff, 0.7);
    dir.position.set(6, 18, 8);
    dir.castShadow = true;
    dir.shadow.mapSize.set(1024, 1024);
    scene.add(dir);
    const fill = new THREE.DirectionalLight(0xb5d5ff, 0.35);
    fill.position.set(-8, 10, -6);
    scene.add(fill);

    // Camera spawn: start inside main lab, facing benches
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.6, -2.2);
    camera.rotation.order = 'YXZ';
    camera.lookAt(0, 1.6, 0.6); // look toward center / benches

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;

    const controls = new PointerLockControls(camera, document.body);

    const worldMinX = -HALF_X - 1 - 6;       // extend left enough to include two side rooms
    const worldMaxX = officeMinX + 1;        // beyond outer office wall on right
    const worldMinZ = -HALF_Z - 1;
    const worldMaxZ = HALF_Z + 1;

    // --- Multiplayer setup (via Socket.IO) ---
    const otherPlayers = new Map(); // id -> { group }
    let myId = null;

    function createOtherAvatar(color = 0x36cfc9) {
      const group = new THREE.Group();
      const bodyMat = new THREE.MeshStandardMaterial({
        color,
        roughness: 0.45,
        metalness: 0.05,
      });
      const headMat = new THREE.MeshStandardMaterial({
        color: 0xf7fafc,
        roughness: 0.9,
      });

      const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 0.8, 8, 16), bodyMat);
      body.castShadow = true;
      group.add(body);

      const head = new THREE.Mesh(new THREE.SphereGeometry(0.24, 16, 16), headMat);
      head.position.y = 0.9;
      head.castShadow = true;
      group.add(head);

      return group;
    }

    function upsertOtherPlayer(id, state) {
      if (id === myId) return;
      let entry = otherPlayers.get(id);
      if (!entry) {
        const color = 0x36cfc9 + (otherPlayers.size * 0x111111);
        const group = createOtherAvatar(color);
        scene.add(group);
        entry = { group };
        otherPlayers.set(id, entry);
      }
      entry.group.position.set(state.x, state.y - 1.6 + PLAYER_R * 2, state.z);
      entry.group.rotation.y = state.ry;
    }

    function removeOtherPlayer(id) {
      const entry = otherPlayers.get(id);
      if (!entry) return;
      scene.remove(entry.group);
      otherPlayers.delete(id);
    }

    // Connect to multiplayer server (run server.js locally)
    let socket = null;
    if (window.io) {
      try {
        // Multiplayer server — use your AWS host public IP (port 3000 must be open)
        socket = io('http://18.118.2.51:3000', { transports: ['websocket'] });
      } catch (e) {
        socket = null;
      }
    }

    if (socket) {
      socket.on('init', (payload) => {
        myId = payload.id;
        const players = payload.players || {};
        Object.entries(players).forEach(([id, state]) => {
          if (id !== myId) upsertOtherPlayer(id, state);
        });
      });

      socket.on('playerJoined', ({ id, state }) => {
        upsertOtherPlayer(id, state);
      });

      socket.on('playerState', ({ id, state }) => {
        upsertOtherPlayer(id, state);
      });

      socket.on('playerLeft', ({ id }) => {
        removeOtherPlayer(id);
      });
    }

    function clampPosition(pos) {
      const margin = PLAYER_R + 0.06;
      pos.y = 1.6;
      for (let i = 0; i < bounds.length; i++) {
        const b = bounds[i];
        const cx = THREE.MathUtils.clamp(pos.x, b.minX, b.maxX);
        const cz = THREE.MathUtils.clamp(pos.z, b.minZ, b.maxZ);
        const dx = pos.x - cx;
        const dz = pos.z - cz;
        const distSq = dx * dx + dz * dz;
        if (distSq < margin * margin && distSq > 1e-6) {
          const dist = Math.sqrt(distSq);
          const push = margin - dist;
          pos.x += (dx / dist) * push;
          pos.z += (dz / dist) * push;
        }
      }
      pos.x = THREE.MathUtils.clamp(pos.x, worldMinX + margin, worldMaxX - margin);
      pos.z = THREE.MathUtils.clamp(pos.z, worldMinZ + margin, worldMaxZ + margin);
    }

    controls.addEventListener('lock', () => {
      document.body.classList.add('pointer-locked');
      promptEl.classList.add('hidden');
      crosshair.classList.remove('hidden');
    });
    controls.addEventListener('unlock', () => {
      document.body.classList.remove('pointer-locked');
      promptEl.classList.remove('hidden');
      crosshair.classList.add('hidden');
    });

    function tryLock() {
      controls.lock().catch(() => {});
    }
    document.body.addEventListener('click', tryLock);
    canvas.addEventListener('click', tryLock);

    const moveSpeed = 0.1;
    const keys = { w: false, a: false, s: false, d: false };
    document.addEventListener('keydown', (e) => {
      const k = e.code.toLowerCase();
      if (k === 'keyw') keys.w = true;
      if (k === 'keya') keys.a = true;
      if (k === 'keys') keys.s = true;
      if (k === 'keyd') keys.d = true;
    });
    document.addEventListener('keyup', (e) => {
      const k = e.code.toLowerCase();
      if (k === 'keyw') keys.w = false;
      if (k === 'keya') keys.a = false;
      if (k === 'keys') keys.s = false;
      if (k === 'keyd') keys.d = false;
    });

    let lastNetSend = 0;

    function animate() {
      requestAnimationFrame(animate);
      if (controls.isLocked) {
        const dir = new THREE.Vector3();
        camera.getWorldDirection(dir);
        dir.y = 0;
        dir.normalize();
        const right = new THREE.Vector3();
        camera.getWorldDirection(right);
        right.cross(camera.up).normalize();
        right.y = 0;
        right.normalize();
        if (keys.w) camera.position.addScaledVector(dir, moveSpeed);
        if (keys.s) camera.position.addScaledVector(dir, -moveSpeed);
        if (keys.a) camera.position.addScaledVector(right, -moveSpeed);
        if (keys.d) camera.position.addScaledVector(right, moveSpeed);
        clampPosition(camera.position);

        // Send our state to the multiplayer server at ~20 Hz
        const now = performance.now();
        if (socket && myId && now - lastNetSend > 50) {
          lastNetSend = now;
          const state = {
            x: camera.position.x,
            y: camera.position.y,
            z: camera.position.z,
            ry: camera.rotation.y,
          };
          socket.emit('state', state);
        }
      }
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
